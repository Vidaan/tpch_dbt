name: tpch_sales_analytics
description: "Semantic model for TPC-H sales analytics - covers orders, customers, suppliers, and products"

tables:
  - name: orders
    description: "Orders fact table with aggregated metrics"
    base_table:
      database: DBT_DB
      schema: DBT_SCH
      table: FCT_ORDERS
    dimensions:
      - name: order_key
        synonyms: ["order id", "order number"]
        description: "Unique identifier for orders"
        expr: order_key
        data_type: NUMBER
        unique: true
      - name: customer_name
        synonyms: ["client name"]
        description: "Name of the customer"
        expr: customer_name
        data_type: VARCHAR
      - name: market_segment
        synonyms: ["segment"]
        description: "Customer market segment"
        expr: market_segment
        data_type: VARCHAR
        sample_values: ["AUTOMOBILE", "BUILDING", "FURNITURE", "MACHINERY", "HOUSEHOLD"]
      - name: customer_region
        synonyms: ["region"]
        description: "Region of the customer"
        expr: customer_region
        data_type: VARCHAR
        sample_values: ["AFRICA", "AMERICA", "ASIA", "EUROPE", "MIDDLE EAST"]
      - name: order_status
        description: "Order status (F=Fulfilled, O=Open, P=Pending)"
        expr: order_status
        data_type: VARCHAR
        sample_values: ["F", "O", "P"]
      - name: order_priority
        description: "Priority level of the order"
        expr: order_priority
        data_type: VARCHAR
    time_dimensions:
      - name: order_date
        synonyms: ["date", "order placed date"]
        description: "Date when the order was placed"
        expr: order_date
        data_type: DATE
    measures:
      - name: total_orders
        synonyms: ["order count", "number of orders"]
        description: "Total number of orders"
        expr: COUNT(order_key)
        data_type: NUMBER
      - name: total_revenue
        synonyms: ["revenue", "sales"]
        description: "Total revenue after discounts"
        expr: SUM(net_amount)
        data_type: NUMBER
      - name: average_order_value
        synonyms: ["AOV", "avg order"]
        description: "Average order value"
        expr: AVG(net_amount)
        data_type: NUMBER
      - name: total_quantity
        synonyms: ["units sold"]
        description: "Total quantity sold"
        expr: SUM(total_quantity)
        data_type: NUMBER

  - name: customers
    description: "Customer dimension"
    base_table:
      database: DBT_DB
      schema: DBT_SCH
      table: DIM_CUSTOMERS
    dimensions:
      - name: customer_key
        description: "Unique customer identifier"
        expr: customer_key
        data_type: NUMBER
        unique: true
      - name: customer_name
        description: "Customer name"
        expr: customer_name
        data_type: VARCHAR
      - name: market_segment
        description: "Market segment"
        expr: market_segment
        data_type: VARCHAR
      - name: nation_name
        synonyms: ["country"]
        description: "Customer country"
        expr: nation_name
        data_type: VARCHAR
      - name: region_name
        synonyms: ["region"]
        description: "Customer region"
        expr: region_name
        data_type: VARCHAR

verified_queries:
  - name: top_customers_by_revenue
    question: "Who are the top 10 customers by revenue?"
    use_as_onboarding_question: true
    sql: |
      SELECT customer_name, SUM(net_amount) as total_revenue
      FROM DBT_DB.DBT_SCH.FCT_ORDERS
      GROUP BY customer_name
      ORDER BY total_revenue DESC
      LIMIT 10

  - name: revenue_by_region
    question: "What is the total revenue by region?"
    use_as_onboarding_question: true
    sql: |
      SELECT customer_region, SUM(net_amount) as total_revenue
      FROM DBT_DB.DBT_SCH.FCT_ORDERS
      GROUP BY customer_region
      ORDER BY total_revenue DESC